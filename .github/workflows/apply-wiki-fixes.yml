# One-shot helper: applies Docs/wiki-audit/wiki-fixes.patch to the GitHub wiki
# (github.com/danikf/tik4net/wiki) and pushes it. Safe to re-run — exits early
# if the patch is already applied. Delete this file once the wiki is updated.
name: Apply wiki fixes

on:
  push:
    branches: ['claude/wiki-audit-improvement-6syn2s']
    paths:
      - '.github/workflows/apply-wiki-fixes.yml'
      - 'Docs/wiki-audit/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply patch to wiki and push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git" /tmp/wiki
          cd /tmp/wiki
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git log --format=%s | grep -Fq "Wiki audit: fix invalid info"; then
            echo "Wiki fixes already applied — nothing to do."
            exit 0
          fi

          if ! git am "$GITHUB_WORKSPACE/Docs/wiki-audit/wiki-fixes.patch"; then
            git am --abort || true
            echo "::error::git am failed — the wiki changed since the patch was created. Apply manually."
            exit 1
          fi

          git push origin master
          echo "Wiki updated successfully."

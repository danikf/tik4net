name: Publish NuGet packages

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 4.0.0-alpha)'
        required: true
      dry_run:
        description: 'Dry run — build but do not push to NuGet.org'
        type: boolean
        default: false

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $v = '${{ inputs.version }}'
          } else {
            $v = '${{ github.ref_name }}' -replace '^v', ''
          }
          $av = ($v -split '-')[0]
          Write-Output "VERSION=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Output "ASM_VERSION=$av" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Publishing version: $v (assembly: $av)"

      - name: Pack tik4net
        run: >
          dotnet pack tik4net/tik4net.csproj
          -c Release
          -o Build
          /p:Version=${{ steps.ver.outputs.VERSION }}
          /p:AssemblyVersion=${{ steps.ver.outputs.ASM_VERSION }}.0
          /p:FileVersion=${{ steps.ver.outputs.ASM_VERSION }}.0

      - name: Pack tik4net.objects
        run: >
          dotnet pack tik4net.objects/tik4net.objects.csproj
          -c Release
          -o Build
          /p:Version=${{ steps.ver.outputs.VERSION }}
          /p:AssemblyVersion=${{ steps.ver.outputs.ASM_VERSION }}.0
          /p:FileVersion=${{ steps.ver.outputs.ASM_VERSION }}.0

      - name: Pack tik4net.testing
        run: >
          dotnet pack tik4net.testing/tik4net.testing.csproj
          -c Release
          -o Build
          /p:Version=${{ steps.ver.outputs.VERSION }}
          /p:AssemblyVersion=${{ steps.ver.outputs.ASM_VERSION }}.0
          /p:FileVersion=${{ steps.ver.outputs.ASM_VERSION }}.0

      - name: Pack tik4net.ssh
        run: >
          dotnet pack tik4net.ssh/tik4net.ssh.csproj
          -c Release
          -o Build
          /p:Version=${{ steps.ver.outputs.VERSION }}
          /p:AssemblyVersion=${{ steps.ver.outputs.ASM_VERSION }}.0
          /p:FileVersion=${{ steps.ver.outputs.ASM_VERSION }}.0

      - name: Pack tik4net.mcp (.NET tool)
        run: >
          dotnet pack Tools/tik4net.mcp/tik4net.mcp.csproj
          -c Release
          -o Build
          /p:Version=${{ steps.ver.outputs.VERSION }}
          /p:AssemblyVersion=${{ steps.ver.outputs.ASM_VERSION }}.0
          /p:FileVersion=${{ steps.ver.outputs.ASM_VERSION }}.0

      - name: Restore Tools (NuGet packages for old-style projects)
        run: nuget restore Tools\tik4net.entityWikiImporter\tik4net.entityWikiImporter.csproj

      - name: Build tik4net.entitygenerator
        run: >
          msbuild Tools\tik4net.entitygenerator\tik4net.entitygenerator.csproj
          /p:Configuration=Release
          /t:Rebuild
          /verbosity:minimal

      - name: Build tik4net.entityWikiImporter
        run: >
          msbuild Tools\tik4net.entityWikiImporter\tik4net.entityWikiImporter.csproj
          /p:Configuration=Release
          /t:Rebuild
          /verbosity:minimal

      - name: Assemble Tools zip
        id: tools_zip
        shell: pwsh
        run: |
          $version = '${{ steps.ver.outputs.VERSION }}'
          $zipName = "tik4net-tools-$version.zip"
          $tmp = "tools-staging"
          New-Item -ItemType Directory -Path $tmp -Force | Out-Null

          $gen = "Tools\tik4net.entitygenerator\bin\Release"
          Copy-Item "$gen\tik4net.entitygenerator.exe"        $tmp
          Copy-Item "$gen\tik4net.entitygenerator.exe.config" $tmp
          Copy-Item "$gen\tik4net.dll"                        $tmp
          Copy-Item "$gen\tik4net.objects.dll"                $tmp -ErrorAction SilentlyContinue
          Copy-Item "Tools\tik4net.entitygenerator\Info.txt"  "$tmp\entitygenerator.Info.txt"

          $wiki = "Tools\tik4net.entityWikiImporter\bin\Release"
          Copy-Item "$wiki\tik4net.entityWikiImporter.exe"        $tmp
          Copy-Item "$wiki\tik4net.entityWikiImporter.exe.config" $tmp
          Copy-Item "$wiki\HtmlAgilityPack.dll"                   $tmp -ErrorAction SilentlyContinue
          Copy-Item "Tools\tik4net.entityWikiImporter\Info.txt"   "$tmp\entityWikiImporter.Info.txt"

          Compress-Archive -Path "$tmp\*" -DestinationPath $zipName
          Write-Output "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: List build artifacts
        shell: pwsh
        run: Get-ChildItem Build\*.nupkg | Select-Object Name, Length

      - name: Push to NuGet.org
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run == false }}
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: >
          dotnet nuget push "Build\*.nupkg"
          --api-key $env:NUGET_API_KEY
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Push to GitHub Packages
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run == false }}
        run: >
          dotnet nuget push "Build\*.nupkg"
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --source https://nuget.pkg.github.com/danikf/index.json
          --skip-duplicate

      - name: Create GitHub Release
        if: ${{ github.event_name == 'push' }}
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.ver.outputs.VERSION }}
          prerelease: ${{ contains(steps.ver.outputs.VERSION, '-') }}
          generate_release_notes: true
          body: |
            ## tik4net ${{ steps.ver.outputs.VERSION }}

            Full release notes and version history: **[Wiki → History](https://github.com/danikf/tik4net/wiki/History)**

            ### What's new in 4.0

            **9 new connection types** — all implement the same `ITikConnection` / `LoadAll<T>()` / `Save<T>()` interface:
            | Type | Transport | Port | Notes |
            |---|---|---|---|
            | `Rest` / `RestSsl` | HTTP/HTTPS | 80/443 | RouterOS 7.1+, CRUD only |
            | `Telnet` | TCP | 23 | plain-text terminal |
            | `MacTelnet` | UDP broadcast | 20561 | Layer-2, no IP needed |
            | `WinboxCli` | TCP | 8291 | WinBox terminal over TCP |
            | `WinboxCliMac` | UDP | 20561 | WinBox terminal over MAC |
            | `WinboxNative` | TCP | 8291 | native M2 binary protocol, full CRUD + streaming |
            | `WinboxNativeMac` | UDP | 20561 | native M2 over MAC |
            | `Ssh` *(satellite)* | TCP | 22 | requires `tik4net.ssh` NuGet |

            **Other additions:**
            - **Change tracking** — `tik4net.entities` tracks which properties changed; `Save<T>()` sends only the diff
            - **Safe Mode** — `TakeSafeMode()` / `ReleaseSafeMode()` across all transports; auto-rollback on disconnect
            - **Streaming monitors** — `ExecuteAsync` / `LoadListenAsync` for live data (WinBox Native; `listen` poll+diff on other transports)
            - **`TikConnectionSetup`** — unified connection builder with all transport-specific options
            - **Connection capability model** — `connection.Supports(TikConnectionCapability.Listen)` etc.
            - **Raw command pass-through** — `ExecuteRaw` for commands not covered by the O/R mapper
            - **WinBox GUI-name addressing** — address entities by their WinBox display name on `WinboxNative`

            ### Breaking changes (from 3.6)

            - **Exception hierarchy unified** — `TikCommandException` subtypes restructured; review `catch` blocks that catch specific exception types
            - **SSH is now a satellite package** — add `tik4net.ssh` and call `Tik4NetSsh.Register()` at startup (the old `TikConnectionType.Ssh` stub is still in the enum but now routes to the satellite)
            - **`TikConnectionType.Api_v2` / `ApiSsl_v2`** — already `[Obsolete(error)]` in 3.6, unchanged in 4.0; remove any remaining usages

            ### NuGet packages
            | Package | Install |
            |---|---|
            | `tik4net` | `dotnet add package tik4net --version ${{ steps.ver.outputs.VERSION }}` |
            | `tik4net.entities` | `dotnet add package tik4net.entities --version ${{ steps.ver.outputs.VERSION }}` |
            | `tik4net.ssh` *(satellite, opt-in)* | `dotnet add package tik4net.ssh --version ${{ steps.ver.outputs.VERSION }}` |
            | `tik4net.testing` | `dotnet add package tik4net.testing --version ${{ steps.ver.outputs.VERSION }}` |
            | `tik4net.mcp` *(dev/debug helper tool)* | `dotnet tool install -g tik4net.mcp --version ${{ steps.ver.outputs.VERSION }}` |

            ### Tools (in zip asset)
            - `tik4net.entitygenerator.exe` — generate entity code from a live router
            - `tik4net.entityWikiImporter.exe` — generate entity code from MikroTik wiki

            ---
          files: |
            Build/*.nupkg
            ${{ steps.tools_zip.outputs.ZIP_NAME }}
